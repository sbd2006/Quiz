<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Modern Quiz - El Juego</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --accent: #f7df1e;
            --success: #2ea043;
            --error: #f85149;
            --border: #30363d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { color: var(--accent); margin-bottom: 1.5rem; font-size: 1.5rem; }
        
        .question-text { font-size: 1.2rem; margin-bottom: 1.5rem; min-height: 60px; }

        .options-grid {
            display: grid;
            gap: 10px;
        }

        button {
            background-color: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            border-color: var(--accent);
            background-color: #1c2128;
        }

        button:disabled { cursor: not-allowed; opacity: 0.7; }

        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }

        #score-board { display: none; }
        .btn-restart { 
            margin-top: 1rem; 
            background-color: var(--accent); 
            color: black; 
            font-weight: bold; 
            width: 100%;
        }

        .code-snippet {
            background: #000;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            color: #d1d1d1;
            display: block;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="quiz-section">
            <h1 id="title">Quiz JS</h1>
            <div id="question-container">
                <div class="question-text" id="question">Cargando pregunta...</div>
                <div id="code-area"></div>
                <div class="options-grid" id="options">
                    </div>
            </div>
        </div>

        <div id="score-board">
            <h1>¡Juego Terminado!</h1>
            <p id="final-result"></p>
            <button class="btn-restart" onclick="location.reload()">Jugar de nuevo</button>
        </div>
    </div>

    <script>
        
        const dbPreguntas = [
            {
                pregunta: "¿Cuál es el símbolo correcto para usar Template Literals?",
                opciones: ["Comillas simples (' ')", "Comillas dobles (\" \")", "Backticks (` `)"],
                correcta: 2,
                codigo: "const saludo = `Hola Mundo`;"
            },
            {
                pregunta: "¿Qué operador permite 'esparcir' elementos de un arreglo?",
                opciones: ["Operador Rest (...)", "Spread Operator (...)", "Operador Punto (.)"],
                correcta: 1,
                codigo: "const nuevoArr = [...viejoArr];"
            },
            {
                pregunta: "En Destructuring de objetos, ¿qué es lo más importante?",
                opciones: ["El orden de las variables", "La posición en el arreglo", "El nombre de la propiedad"],
                correcta: 2,
                codigo: "const { nombre } = usuario;"
            }
        ];

        
        let indexPregunta = 0;
        let puntos = 0;


        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const codeEl = document.getElementById('code-area');
        const quizSection = document.getElementById('quiz-section');
        const scoreBoard = document.getElementById('score-board');


        function cargarPregunta() {
            const current = dbPreguntas[indexPregunta];
            
            const { pregunta, opciones, codigo } = current;

            questionEl.innerText = `Pregunta ${indexPregunta + 1}: ${pregunta}`;
            
            codeEl.innerHTML = codigo ? `<span class="code-snippet">${codigo}</span>` : "";
            optionsEl.innerHTML = "";


            opciones.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.onclick = () => verificarRespuesta(i);
                optionsEl.appendChild(btn);
            });
        }

        function verificarRespuesta(indiceSeleccionado) {
            const botones = optionsEl.querySelectorAll('button');
            const correcta = dbPreguntas[indexPregunta].correcta;

            if (indiceSeleccionado === correcta) {
                botones[indiceSeleccionado].classList.add('correct');
                puntos++;
            } else {
                botones[indiceSeleccionado].classList.add('wrong');
                botones[correcta].classList.add('correct');
            }

            botones.forEach(b => b.disabled = true);

            setTimeout(() => {
                indexPregunta++;
                if (indexPregunta < dbPreguntas.length) {
                    cargarPregunta();
                } else {
                    mostrarResultados();
                }
            }, 1500);
        }

        function mostrarResultados() {
            quizSection.style.display = 'none';
            scoreBoard.style.display = 'block';
            
            document.getElementById('final-result').innerHTML = `
                Has obtenido <strong>${puntos}</strong> de <strong>${dbPreguntas.length}</strong> puntos.<br><br>
                ${puntos === 3 ? "¡Eres un maestro de ES6!" : "¡Sigue practicando!"}
            `;
        }

        cargarPregunta();

    </script>
</body>
</html>
